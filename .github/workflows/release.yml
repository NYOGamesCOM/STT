name: Release

# Triggered by pushing a tag like `v0.1.0`, or run manually from the Actions tab.
# Builds STT for Windows / macOS / Linux with PyInstaller and attaches each
# binary to a GitHub Release for that tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (must already exist, e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            asset: STT-windows-x64.exe
            build_args: --onefile --noconsole --name STT --version-file version_info.txt
          - name: macOS (arm64)
            os: macos-latest
            asset: STT-macos.zip
            build_args: --onefile --windowed --name STT
          - name: Linux x64
            os: ubuntu-latest
            asset: STT-linux-x64
            build_args: --onefile --name STT

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── System dependencies ──────────────────────────────────────────────

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            portaudio19-dev \
            python3-tk \
            libcairo2-dev \
            libgirepository1.0-dev \
            gir1.2-gtk-3.0 \
            gir1.2-ayatanaappindicator3-0.1 \
            xclip

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: brew install portaudio

      # ── Python dependencies ──────────────────────────────────────────────

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.10.0

      # ── Build ────────────────────────────────────────────────────────────

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller ${{ matrix.build_args }} \
            --noupx \
            --collect-all numpy \
            --collect-all faster_whisper \
            --collect-all ctranslate2 \
            --collect-all onnxruntime \
            --collect-all tokenizers \
            --noconfirm \
            stt.py

      # ── Stage artifact with a predictable name ───────────────────────────

      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/STT.exe ${{ matrix.asset }}

      - name: Stage Linux artifact
        if: runner.os == 'Linux'
        run: |
          mv dist/STT ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Stage macOS artifact
        if: runner.os == 'macOS'
        run: |
          cd dist && zip -r ../${{ matrix.asset }} STT.app

      # ── Extract release notes from CHANGELOG.md ──────────────────────────

      - name: Build release notes from CHANGELOG
        shell: bash
        run: |
          tag="${{ github.ref_name || inputs.tag }}"
          # Extract section for this tag + strip leading blank lines in one pass
          # (portable: avoids BSD-vs-GNU sed -i differences on the macOS runner).
          awk -v ver="$tag" '
            $0 ~ "^## "ver"( |$)" { capture=1; started=0; next }
            capture && /^## v/    { exit }
            capture {
              if (!started && NF == 0) next
              started=1
              print
            }
          ' CHANGELOG.md > _notes.md

          if [ ! -s _notes.md ]; then
            printf "See the [commit log](https://github.com/%s/commits/%s) for changes in this release.\n" \
              "${{ github.repository }}" "$tag" > _notes.md
          fi

          {
            echo "## Downloads"
            echo
            echo "| Platform | Asset | Notes |"
            echo "|---|---|---|"
            echo "| Windows x64 | \`STT-windows-x64.exe\` | Run **as Administrator** (required for global hotkeys) |"
            echo "| macOS (arm64) | \`STT-macos.zip\` | Unzip, then grant **Accessibility** in System Settings → Privacy & Security |"
            echo "| Linux x64 | \`STT-linux-x64\` | Run with **\`sudo\`** (the \`keyboard\` library needs root on Linux) |"
            echo
            echo "First launch downloads the Whisper \`base\` model (~150 MB)."
            echo
            echo "---"
            echo
          } > _header.md

          cat _notes.md _header.md > release_notes.md
          echo '--- RELEASE NOTES ---'
          cat release_notes.md

      # ── Upload to release ────────────────────────────────────────────────

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          tag_name: ${{ github.ref_name || inputs.tag }}
          body_path: release_notes.md
          generate_release_notes: false
